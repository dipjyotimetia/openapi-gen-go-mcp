components:
    schemas:
        ErrorModel:
            properties:
                code:
                    format: int32
                    type: integer
                message:
                    type: string
            required:
                - code
                - message
            type: object
        NewPet:
            properties:
                name:
                    type: string
                tag:
                    type: string
            required:
                - name
            type: object
        Pet:
            allOf:
                - $ref: '#/components/schemas/NewPet'
                - properties:
                    id:
                        format: int64
                        type: integer
                  required:
                    - id
            type: object
info:
    contact:
        name: Swagger API Team
    description: A sample API that uses a petstore as an example to demonstrate features in the swagger-2.0 specification
    license:
        name: MIT
    termsOfService: http://swagger.io/terms/
    title: Swagger Petstore
    version: 1.0.0
openapi: 3.0.3
paths:
    /pets:
        get:
            description: Returns all pets from the system that the user has access to
            operationId: findPets
            parameters:
                - description: tags to filter by
                  in: query
                  name: tags
                  schema:
                    items:
                        type: string
                    type: array
                - description: maximum number of results to return
                  in: query
                  name: limit
                  schema:
                    format: int32
                    type: integer
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/Pet'
                                type: array
                    description: pet response
                default:
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: unexpected error
        post:
            description: Creates a new pet in the store.  Duplicates are allowed
            operationId: addPet
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/NewPet'
                description: Pet to add to the store
                required: true
                x-originalParamName: pet
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Pet'
                    description: pet response
                default:
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: unexpected error
    /pets/{id}:
        delete:
            description: deletes a single pet based on the ID supplied
            operationId: deletePet
            parameters:
                - description: ID of pet to delete
                  in: path
                  name: id
                  required: true
                  schema:
                    format: int64
                    type: integer
            responses:
                "204":
                    description: pet deleted
                default:
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: unexpected error
        get:
            description: Returns a user based on a single ID, if the user does not have access to the pet
            operationId: findPetById
            parameters:
                - description: ID of pet to fetch
                  in: path
                  name: id
                  required: true
                  schema:
                    format: int64
                    type: integer
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Pet'
                    description: pet response
                default:
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: unexpected error
servers:
    - url: http://petstore.swagger.io/api
